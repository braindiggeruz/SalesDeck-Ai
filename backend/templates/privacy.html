{% extends "base.html" %}
{% block content %}
<section class="section-padding">
  <div class="section-container max-w-3xl">
    <h1 class="text-3xl font-bold text-white mb-2" data-testid="privacy-title">{{ c.privacy.title }}</h1>
    <p class="text-sm text-slate-500 mb-10">{{ c.privacy.updated }}</p>
    <div class="space-y-8">
      {% for sec in c.privacy.sections %}
      <div data-testid="privacy-section-{{ loop.index }}">
        <h2 class="text-lg font-semibold text-white mb-3">{{ sec.title }}</h2>
        <p class="text-slate-400 text-sm leading-relaxed">{{ sec.text }}</p>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
