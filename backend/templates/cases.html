{% extends "base.html" %}
{% block content %}
<section class="section-padding">
  <div class="section-container max-w-4xl">
    <h1 class="text-3xl sm:text-4xl font-bold text-white mb-4" data-testid="cases-title">{{ c.cases.title }}</h1>
    <p class="text-lg text-neutral-400 mb-10">{{ c.cases.desc }}</p>
    <div class="card text-center py-16" data-testid="cases-placeholder">
      <div class="w-16 h-16 rounded-2xl bg-brand-accent/10 flex items-center justify-center mx-auto mb-5">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#C47C3C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m9 12 2 2 4-4"/></svg>
      </div>
      <p class="text-neutral-400 mb-6">{{ c.cases.coming_soon }}</p>
      <a href="/{{ lang }}/demo/" class="btn-primary text-sm" data-track="widget_engaged">{{ c.cta.try_demo }}</a>
    </div>
  </div>
</section>
{% endblock %}
