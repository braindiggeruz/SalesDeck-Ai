{% extends "base.html" %}
{% block content %}
<section class="section-padding">
  <div class="section-container max-w-3xl">
    <h1 class="text-3xl font-bold text-white mb-2" data-testid="terms-title">{{ c.terms.title }}</h1>
    <p class="text-sm text-neutral-500 mb-10">{{ c.terms.updated }}</p>
    <div class="space-y-8">
      {% for sec in c.terms.sections %}
      <div data-testid="terms-section-{{ loop.index }}">
        <h2 class="text-lg font-semibold text-white mb-3">{{ sec.title }}</h2>
        <p class="text-neutral-400 text-sm leading-relaxed">{{ sec.text }}</p>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
