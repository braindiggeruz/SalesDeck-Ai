{% extends "base.html" %}
{% block content %}
<section class="section-padding">
  <div class="section-container text-center">
    <div class="max-w-md mx-auto">
      <div class="text-8xl font-extrabold gradient-text mb-6" data-testid="404-code">404</div>
      <h1 class="text-2xl font-bold text-white mb-4" data-testid="404-title">{{ c.not_found.title }}</h1>
      <p class="text-neutral-400 mb-8">{{ c.not_found.desc }}</p>
      <a href="/{{ lang }}/" class="btn-primary" data-testid="404-home-btn">{{ c.not_found.cta }}</a>
    </div>
  </div>
</section>
{% endblock %}
