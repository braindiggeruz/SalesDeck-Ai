<section class="section-padding bg-brand-surface border-y border-brand-border">
  <div class="section-container text-center">
    <h2 class="fluid-h2 font-bold text-white mb-4">{{ cta_title }}</h2>
    <p class="text-neutral-400 mb-3 max-w-xl mx-auto">{{ cta_desc }}</p>
    <p class="text-xs text-neutral-600 mb-7">{{ c.cta_micro }}</p>
    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <a href="/{{ lang }}/demo/" class="btn-primary" data-testid="cta-demo" data-track="hero_cta_click" data-track-payload='{"location":"cta_block","target":"demo"}' aria-label="{{ c.cta.primary }}">{{ c.cta.primary }}</a>
      <a href="/{{ lang }}/contact/" class="btn-secondary" data-testid="cta-contact" data-track="secondary_cta_click" data-track-payload='{"location":"cta_block","target":"contact"}' aria-label="{{ c.cta.secondary }}">{{ c.cta.secondary }}</a>
    </div>
    {% if telegram_url %}
    <div class="mt-5">
      <a href="{{ telegram_url }}" target="_blank" rel="noopener" class="inline-flex items-center gap-1.5 text-sm text-neutral-400 hover:text-brand-accent-light transition-colors" data-testid="cta-telegram-link" data-track="telegram_click" data-track-payload='{"location":"cta_block"}'>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        {{ c.cta.telegram }} →
      </a>
    </div>
    {% endif %}
  </div>
</section>
