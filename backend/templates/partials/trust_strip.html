<!-- Trust Strip (under hero) -->
<section class="border-y border-brand-border bg-brand-surface/40" data-testid="trust-strip">
  <div class="section-container py-5 sm:py-6">
    <ul class="flex flex-wrap items-center justify-center gap-x-7 gap-y-2.5 text-xs sm:text-sm text-neutral-400">
      {% for item in c.trust_strip %}
      <li class="flex items-center gap-2" data-testid="trust-item-{{ loop.index }}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C47C3C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="shrink-0"><polyline points="20 6 9 17 4 12"/></svg>
        <span>{{ item }}</span>
      </li>
      {% endfor %}
    </ul>
    <p class="text-[11px] text-neutral-600 text-center mt-3 max-w-2xl mx-auto leading-relaxed">{{ c.trust_strip_note }}</p>
  </div>
</section>
